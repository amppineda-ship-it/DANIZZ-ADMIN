<app-client-sidebar [mobileOpen]="sidebarOpen()" (closeMenu)="sidebarOpen.set(false)" />

<main class="client-page" @pageFade>
  <section class="contact-shell">
    <header class="page-header">
      <button mat-icon-button class="menu-toggle" type="button" aria-label="Abrir menu" (click)="sidebarOpen.set(true)">
        <mat-icon>menu</mat-icon>
      </button>
      <div>
        <p>Estamos aqui</p>
        <h1>Contactanos</h1>
      </div>
    </header>

    <div class="contact-list">
      <article>
        <mat-icon>location_on</mat-icon>
        <div>
          <small>Direccion</small>
          <strong>Quito, Ecuador - Sector Norte</strong>
        </div>
      </article>

      <button type="button" class="contact-row" (click)="openWhatsApp()">
        <mat-icon>phone</mat-icon>
        <span>
          <small>WhatsApp</small>
          <strong>+593 980674115</strong>
        </span>
      </button>

      <article>
        <mat-icon>mail</mat-icon>
        <div>
          <small>Email</small>
          <strong>danizzservice@gmail.com</strong>
        </div>
      </article>

      <article>
        <mat-icon>schedule</mat-icon>
        <div>
          <small>Horario</small>
          <strong>Lun-Vie: 8:00-18:00 - Sab: 9:00-14:00</strong>
        </div>
      </article>
    </div>

    <button mat-flat-button class="whatsapp-button" type="button" (click)="openWhatsApp()">
      <mat-icon>chat</mat-icon>
      Mensaje por WhatsApp
    </button>
  </section>

  <app-client-footer />
</main>
