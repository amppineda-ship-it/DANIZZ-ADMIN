<div class="login-layout">

  <div class="brand-section">
    <div class="brand-content">
      <h1 class="brand-title">DANIZZ: DISEÑOS<br />&amp; SUBLIMADOS</h1>
      <p class="brand-subtitle">
        Franqueza y Libertad
        <span class="brand-accent"></span>
      </p>
    </div>
  </div>



  <div class="login-section">
    <div class="login-card">

      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C10.9 3 10 3.9 10 5C10 5.74 10.4 6.38 11 6.73V8H6C4.9 8 4 8.9 4 10V19C4 20.1 4.9 21 6 21H18C19.1 21 20 20.1 20 19V10C20 8.9 19.1 8 18 8H13V6.73C13.6 6.38 14 5.74 14 5C14 3.9 13.1 3 12 3Z"/>
        </svg>
        <div class="logo-text">
          <span class="logo-title">DANIZZ</span>
          <span class="logo-subtitle">SUBLIMADOS</span>
        </div>
      </div>

      <h2 class="form-title">INICIAR SESIÓN</h2>

      <div class="error-notification" *ngIf="errorMessage">
        <svg class="error-icon" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div class="input-group">
          <label>Usuario*</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
            <input type="email" formControlName="email" placeholder="correo@ejemplo.com" />
          </div>
          <span class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">El usuario es requerido</span>
          <span class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">Ingresa un correo válido</span>
        </div>

        <div class="input-group">
          <label>Contraseña*</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/>
            </svg>
            <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Contraseña" />
            <svg class="input-icon input-icon-right" viewBox="0 0 24 24" (click)="togglePassword()">
              <path *ngIf="hidePassword" d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5c-1.7-4.4-6-7.5-11-7.5zM12 17c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/>
              <path *ngIf="!hidePassword" d="M12 7c2.8 0 5 2.2 5 5 0 .6-.1 1.2-.4 1.8l2.9 2.9c1.5-1.3 2.7-2.9 3.4-4.7C21.3 7.6 17 4.5 12 4.5c-1.4 0-2.7.3-3.9.7l2.1 2.1C10.8 7.1 11.4 7 12 7zM2 4.3l2.3 2.3.4.4C3 8.3 1.7 10 1 12c1.7 4.4 6 7.5 11 7.5 1.6 0 3.1-.3 4.4-.8l.4.4 2.8 2.8 1.2-1.2L3.2 3 2 4.3zM7.5 9.8l1.6 1.6c-.1.2-.1.4-.1.6 0 1.7 1.3 3 3 3 .2 0 .4 0 .6-.1l1.6 1.6c-.7.3-1.4.5-2.2.5-2.8 0-5-2.2-5-5 0-.8.2-1.5.5-2.2zm4.3-.8l3.2 3.2V12c0-1.7-1.3-3-3-3h-.2z"/>
            </svg>
          </div>
          <span class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">La contraseña es requerida</span>
          <span class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</span>
        </div>

        <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" formControlName="remember" />
            Recordar
          </label>
          <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isLoading">
          <mat-spinner diameter="18" *ngIf="isLoading" style="display:inline-block;"></mat-spinner>
          <svg *ngIf="!isLoading" class="btn-icon" viewBox="0 0 24 24">
            <path d="M12 4l-1.4 1.4L16.2 11H4v2h12.2l-5.6 5.6L12 20l8-8z"/>
          </svg>
          <span *ngIf="!isLoading">INICIAR SESIÓN</span>
        </button>

      </form>
<div class="register-section">
  <p>¿No tienes una cuenta?</p>

  <button
    type="button"
    class="btn-register"
    routerLink="/register">
    Registrarme
  </button>
</div>

<p class="footer-credit">© 2026 Danizz Sublimados</p>
    </div>
  </div>

</div>
